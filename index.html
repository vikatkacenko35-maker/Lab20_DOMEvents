<!DOCTYPE html>
<html lang="ru-Ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab19 - Рaбота с DOM в JS</title>
</head>

<body>
    <h1 id="title">Work with DOM</h1>
    <p class="text">Это абзац</p>
    <button id="btn">Нажми меня</button>
    <div>
        <input type="text" id ="nameInput" placeholder="Ввежите ваше имя" />
        <button id="showName">Показать приветствие</button>
        <button id="clearButton">Очистить</button>
        <p id="output"></p>
    </div>
    <form id="userForm">
        <input type="text" id="username" placeholder="Имя пользователя" />
        <input type="number" id="age" placeholder="Возвраст" />
        <button type="submit">Отправить</button>
    </form>
    <p id="formresult"></p>
    <script src="main.js"></script>
    <div class="user-list-container">
        <h3>Список пользователей</h3>
        <button id="addUserBtn">Добавить пользователя</button>
        <ul id="userList"></ul>
    </div>

</body>

</html>
